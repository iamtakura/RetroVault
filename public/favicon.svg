<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64" width="64" height="64">

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0a0a"/>

  <!-- Cassette body -->
  <rect x="8" y="18" width="48" height="30" rx="4"
    fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1.5"/>

  <!-- Tape window -->
  <rect x="14" y="25" width="36" height="16" rx="2"
    fill="#111111" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Left reel -->
  <circle cx="22" cy="33" r="8"
    fill="#0a0a0a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="22" cy="33" r="3" fill="#8b0000"/>
  <circle cx="22" cy="33" r="1" fill="#0a0a0a"/>

  <!-- Right reel -->
  <circle cx="42" cy="33" r="8"
    fill="#0a0a0a" stroke="#3a3a3a" stroke-width="1.5"/>
  <circle cx="42" cy="33" r="3" fill="#8b0000"/>
  <circle cx="42" cy="33" r="1" fill="#0a0a0a"/>

  <!-- Tape strand -->
  <path d="M 22 38 Q 32 42 42 38"
    stroke="#5a3a1a" stroke-width="1.5"
    fill="none" stroke-linecap="round"/>

  <!-- Label strip -->
  <rect x="12" y="20" width="40" height="5" rx="1"
    fill="#d4c5b0" opacity="0.12"/>

  <!-- Top notches -->
  <rect x="14" y="16" width="4" height="4" rx="1"
    fill="#0a0a0a" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="46" y="16" width="4" height="4" rx="1"
    fill="#0a0a0a" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Crimson accent line -->
  <rect x="8" y="44" width="48" height="2" rx="1"
    fill="#8b0000" opacity="0.8"/>

</svg>